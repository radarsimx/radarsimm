name: Build Windows Libraries

# GitHub Actions workflow for building and packaging RadarSimM on Windows platforms.
#
# This workflow builds RadarSimM with license verification enabled for both
# CPU and GPU architectures. It provides comprehensive Windows coverage with
# both CPU-only and CUDA GPU-accelerated builds.
#
# Build Matrix:
# - Windows Latest: MSVC compiler, 2 builds (2 architectures with license verification)
# - Architectures: CPU (x86_64), GPU (CUDA)
# - License: on (with verification enabled for all builds)
# - Total builds: 2
#
# Features:
# - CUDA toolkit setup for GPU builds
# - Build optimization and caching
# - Artifact verification and validation
# - Multi-architecture artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
#
# Outputs:
# - Individual artifacts for each build configuration
# - Packed archive containing all builds organized by architecture
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch
# - Push to master branch
# - Pull requests to master branch

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows CPU with license verification
          - license: on
            arch: cpu
            artifact_name: radarsimm_win_x86_64_cpu
          # Windows GPU with license verification
          - license: on
            arch: gpu
            artifact_name: radarsimm_win_x86_64_gpu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.RADARSIMCPP }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup CUDA Toolkit
        if: matrix.arch == 'gpu'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '13.1.0'
          method: 'local'
          use-github-cache: false

      - name: Verify CUDA installation
        if: matrix.arch == 'gpu'
        run: |
          echo "::group::CUDA Verification"
          nvcc --version
          echo "CUDA_PATH: %CUDA_PATH%"
          echo "PATH: %PATH%"
          if exist "%CUDA_PATH%\bin\" (
            dir "%CUDA_PATH%\bin\" | findstr nvcc
          ) else (
            echo "CUDA bin directory not found"
          )
          if exist "%CUDA_PATH%\lib\x64\" (
            echo "CUDA lib directory found"
          ) else (
            echo "CUDA lib directory not found"
          )
          echo "::endgroup::"
        shell: cmd
      
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install mbedTLS
        run: |
          .\vcpkg\vcpkg install mbedtls:x64-windows

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: windows-latest"
          echo "License: ${{ matrix.license }}"
          echo "Architecture: ${{ matrix.arch }}"
          if "${{ matrix.arch }}" == "gpu" (
            echo "CUDA Version: $(nvcc --version | findstr "release" | for /f "tokens=5" %%a in ('findstr "release"') do echo %%a)"
          )
          echo "::endgroup::"

          echo "::group::System Information"
          systeminfo | findstr /C:"OS Name" /C:"OS Version"
          if "${{ matrix.arch }}" == "gpu" (
            nvcc --version
          )
          echo "::endgroup::"
        shell: cmd

      - name: Build RadarSimM
        env:
          CUDA_PATH: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDA_HOME: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDACXX: ${{ matrix.arch == 'gpu' && format('{0}\bin\nvcc.exe', env.CUDA_PATH) || '' }}
          CUDA_TOOLKIT_ROOT_DIR: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
        run: |
          echo "::group::Build Process"
          .\build_win.bat --arch=${{ matrix.arch }} --license=${{ matrix.license }}
          echo "::endgroup::"
        shell: cmd

      - name: Create build summary
        run: |
          echo "## Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $env:GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| OS | windows-latest |" >> $env:GITHUB_STEP_SUMMARY
          echo "| License Verification | ${{ matrix.license }} |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ matrix.arch }} |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Artifact Name | ${{ matrix.artifact_name }} |" >> $env:GITHUB_STEP_SUMMARY
        shell: powershell

      - name: Archive built module
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: .\radarsimm_win_x86_64_${{ matrix.arch }}
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            .\build_logs\
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: |
            radarsimm_win_x86_64_cpu*
            radarsimm_win_x86_64_gpu*

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.dll" -o -name "*.h" -o -name "*.lib" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimm_windows_all

          # Create the directory structure
          mkdir -p packed/radarsimm_windows_all/Windows_x86_64_CPU
          mkdir -p packed/radarsimm_windows_all/Windows_x86_64_GPU

          # Copy each artifact to appropriate directory based on architecture
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"
              
              # Determine target directory based on artifact name
              if [[ "$artifact_name" == *"gpu"* ]]; then
                target_dir="packed/radarsimm_windows_all/Windows_x86_64_GPU"
              else
                target_dir="packed/radarsimm_windows_all/Windows_x86_64_CPU"
              fi
              
              # Ensure target directory exists
              mkdir -p "$target_dir"
              
              # Copy the library contents
              echo "Copying library from $dir to $target_dir/"
              cp -r "$dir"/* "$target_dir/" 2>/dev/null || true
            fi
          done

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimm_windows_all -type d | sort
          echo ""
          echo "Files in each directory:"
          for dir in packed/radarsimm_windows_all/*/Windows_*; do
            if [ -d "$dir" ]; then
              echo "Contents of $dir:"
              ls -la "$dir" || echo "Directory is empty or doesn't exist"
              echo ""
            fi
          done
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          cat > packed/radarsimm_windows_all/README.md << 'EOF'
          # RadarSimM Windows Build Artifacts

          This archive contains RadarSimM builds for Windows platforms with license verification enabled.

          ## Directory Structure

          The builds are organized by architecture:

          ```
          Windows_x86_64_CPU/
          ├── radarsimc.dll
          ├── radarsimc.lib
          └── radarsim.h

          Windows_x86_64_GPU/
          ├── radarsimc.dll
          ├── radarsimc.lib
          └── radarsim.h
          ```

          ## Architecture Information

          ### Windows_x86_64_CPU (CPU-only build)
          - Builds with license verification support (requires valid license file)
          - Compatible with any x86_64 Windows system

          ### Windows_x86_64_GPU (CUDA GPU-accelerated build)
          - Builds with license verification support and GPU acceleration
          - Requires CUDA 13.0 or compatible version
          - Compatible with NVIDIA GPUs

          ## Build Information

          - **Total Builds**: 2
          - **Architectures**: x86_64 CPU, x86_64 GPU (CUDA)
          - **License**: All builds include license verification
          - **Library Type**: Dynamic library (.dll) with import library (.lib)
          - **Compiler**: MSVC
          - **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Usage

          1. Choose the appropriate architecture directory for your system:
             - **Windows_x86_64_CPU**: For CPU-only systems
             - **Windows_x86_64_GPU**: For systems with NVIDIA GPU
          2. Link against radarsimc.lib and include radarsim.h in your project
          3. Ensure radarsimc.dll is accessible at runtime
          4. Place valid `license_radarsimc_*.lic` file(s) in your MATLAB working directory
          5. For GPU builds, ensure CUDA runtime is installed on target system

          ## License Activation

          Place `license_radarsimc_*.lic` files in your MATLAB working directory.
          The library automatically searches for and activates licenses on startup.

          Without a valid license, usage limits apply:
          - Maximum 1 TX channel
          - Maximum 1 RX channel
          - Maximum 2 point targets
          - Maximum 2 mesh targets
          - Maximum 8 triangles per mesh

          ## Requirements

          - **CPU builds**: Any x86_64 Windows system
          - **GPU builds**: NVIDIA GPU with CUDA 13.0+ support
          - **Runtime**: Microsoft Visual C++ Redistributable
          EOF

      - name: Create compressed archive
        run: |
          cd packed
          tar -czf radarsimm_windows_all_builds.tar.gz radarsimm_windows_all/

          # Create zip version as well
          zip -r radarsimm_windows_all_builds.zip radarsimm_windows_all/

          echo "::group::Archive Information"
          ls -lh *.tar.gz *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: radarsimm_windows_all_builds
          path: |
            packed/radarsimm_windows_all_builds.tar.gz
            packed/radarsimm_windows_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [build, pack-artifacts]
    runs-on: windows-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo "# Windows RadarSimM Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $env:GITHUB_STEP_SUMMARY
          echo "Total builds: 2 - 2 architectures with license verification" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Architecture Distribution" >> $env:GITHUB_STEP_SUMMARY
          echo "- **CPU x86_64**: 1 build on windows-2025" >> $env:GITHUB_STEP_SUMMARY
          echo "- **GPU CUDA**: 1 build on windows-2025" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### License Configuration" >> $env:GITHUB_STEP_SUMMARY
          echo "- All builds include license verification support" >> $env:GITHUB_STEP_SUMMARY
          echo "- Requires valid license file for unrestricted use" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Artifacts Generated" >> $env:GITHUB_STEP_SUMMARY
          echo "- ``radarsimm_win_x86_64_cpu`` - CPU with license verification" >> $env:GITHUB_STEP_SUMMARY
          echo "- ``radarsimm_win_x86_64_gpu`` - GPU with license verification" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $env:GITHUB_STEP_SUMMARY
          if ("${{ needs.pack-artifacts.result }}" -eq "success") {
            echo "**All artifacts successfully packed into single archive**" >> $env:GITHUB_STEP_SUMMARY
            echo "- Archive: ``radarsimm_windows_all_builds``" >> $env:GITHUB_STEP_SUMMARY
            echo "- Formats: tar.gz, zip" >> $env:GITHUB_STEP_SUMMARY
            echo "- Contains: 2 build variants (CPU and GPU) with license verification" >> $env:GITHUB_STEP_SUMMARY
          } else {
            echo "**Artifact packing failed or was skipped**" >> $env:GITHUB_STEP_SUMMARY
          }
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $env:GITHUB_STEP_SUMMARY
          if ("${{ needs.build.result }}" -eq "success") {
            echo "**All builds completed successfully!**" >> $env:GITHUB_STEP_SUMMARY
          } else {
            echo "**Some builds may have failed. Check individual job logs for details.**" >> $env:GITHUB_STEP_SUMMARY
          }
        shell: powershell
